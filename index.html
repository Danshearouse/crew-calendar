<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Crew Scheduling — Ironrock</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F4;color:#1C1917}

    #loading-screen{position:fixed;inset:0;background:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:998}

    #app{display:none;flex-direction:column;height:100vh}
    .header{display:flex;align-items:center;gap:12px;padding:10px 20px;background:#fff;border-bottom:1px solid #E7E5E4;flex-shrink:0}

    .app-body{display:flex;flex:1;overflow:hidden}
    .sidebar{width:210px;min-width:210px;border-right:1px solid #E7E5E4;display:flex;flex-direction:column;background:#FAFAF9}

    .crew-item:hover,.crew-item.active{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06)}

    .crew-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .crew-count{margin-left:auto;font-size:11px;color:#A8A29E;background:#F5F5F4;border-radius:10px;padding:1px 6px}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fff}
    .topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #E7E5E4;flex-wrap:wrap}

    .nav-btn:hover{background:#F5F5F4}
    .month-title{font-size:15px;font-weight:600;min-width:150px;text-align:center}
    .today-btn{font-size:12px;padding:4px 10px;border:1px solid #E7E5E4;border-radius:6px;background:transparent;cursor:pointer;color:#78716C}

    .view-btn{padding:4px 12px;font-size:12px;background:transparent;border:none;cursor:pointer;color:#78716C}
    .view-btn.active{background:#F5F5F4;color:#1C1917;font-weight:500}
    .btn-primary{padding:6px 14px;font-size:13px;background:#0078D4;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:500}
    .btn-primary:hover{background:#106EBE}
    .stats-bar{display:flex;gap:6px;padding:7px 14px;border-bottom:1px solid #E7E5E4;font-size:12px;flex-wrap:wrap;align-items:center}

    .day-hdr{padding:6px 0;text-align:center;font-size:11px;font-weight:600;color:#78716C;text-transform:uppercase;letter-spacing:.06em}
    .days-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;overflow-y:auto}
    .day-cell{border-right:1px solid #E7E5E4;border-bottom:1px solid #E7E5E4;min-height:100px;padding:4px;cursor:pointer}
    .day-cell:nth-child(7n){border-right:none}
    .day-cell:hover{background:#FAFAF9}
    .day-cell.drag-over{background:#EBF4FC;outline:2px dashed #0078D4}
    .day-cell.other-month .day-num{color:#D6D3D1}

    .conflict-dot{width:7px;height:7px;border-radius:50%;background:#DC2626;flex-shrink:0}
    .job-chip{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;cursor:grab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;border:none;text-align:left;width:100%;display:block}
    .job-chip:hover{filter:brightness(.95)}
    .job-chip.dragging{opacity:.35}
    .job-chip.continuation{opacity:.65;cursor:default}
    .more-jobs{font-size:10px;color:#A8A29E;padding:1px 4px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center}
    .modal{background:#fff;border-radius:12px;width:500px;max-height:93vh;overflow-y:auto;padding:24px;box-shadow:0 24px 64px rgba(0,0,0,.22)}
    .modal-header{display:flex;align-items:center;margin-bottom:20px}
    .modal-header h2{font-size:16px;font-weight:600;flex:1}
    .close-btn{background:transparent;border:none;font-size:22px;cursor:pointer;color:#A8A29E;line-height:1}
    .close-btn:hover{color:#1C1917}
    .form-row{margin-bottom:14px}
    .form-row label{display:block;font-size:12px;font-weight:500;color:#78716C;margin-bottom:4px}
    .form-row input,.form-row select,.form-row textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid #E7E5E4;border-radius:6px;background:#fff;color:#1C1917;outline:none}
    .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#0078D4;box-shadow:0 0 0 3px rgba(0,120,212,.1)}
    .form-row input[readonly]{background:#FAFAF9;color:#78716C}
    .form-row textarea{resize:vertical;min-height:64px}
    .form-row.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-row.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .section-label{font-size:11px;font-weight:600;color:#78716C;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
    .checklist-wrap{border:1px solid #E7E5E4;border-radius:8px;overflow:hidden;margin-bottom:4px}

    .checklist-item:last-child{border-bottom:none}
    .checklist-item:hover{background:#FAFAF9}
    .checklist-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#0078D4}
    .reminder-wrap{border:1px solid #E7E5E4;border-radius:8px;padding:12px;background:#FAFAF9}
    .reminder-toggle-row{display:flex;align-items:center;gap:10px;font-size:13px}
    .reminder-toggle-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#0078D4}
    .reminder-email-input{width:100%;font-size:13px;padding:7px 10px;border:1px solid #E7E5E4;border-radius:6px;margin-top:8px}
    .reminder-note{font-size:11px;color:#A8A29E;margin-top:6px}
    .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;align-items:center}
    .btn-ghost{padding:7px 16px;font-size:13px;background:transparent;color:#78716C;border:1px solid #E7E5E4;border-radius:6px;cursor:pointer}
    .btn-ghost:hover{background:#F5F5F4}
    .btn-danger{padding:7px 14px;font-size:13px;background:transparent;color:#DC2626;border:1px solid #FCA5A5;border-radius:6px;cursor:pointer;margin-right:auto}
    .btn-danger:hover{background:#FEF2F2}
    .dash{flex:1;overflow-y:auto;padding:18px}
    .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .metric-card{background:#fff;border:1px solid #E7E5E4;border-radius:10px;padding:14px 16px}
    .metric-label{font-size:12px;color:#78716C;margin-bottom:6px}
    .metric-val{font-size:28px;font-weight:700}
    .dash-section{border:1px solid #E7E5E4;border-radius:10px;padding:16px;margin-bottom:14px;background:#fff}
    .dash-section h3{font-size:12px;font-weight:600;color:#78716C;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
    .workload-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .workload-name{font-size:13px;width:115px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .workload-bar-bg{flex:1;height:8px;background:#F5F5F4;border-radius:4px;overflow:hidden}
    .workload-bar-fill{height:100%;border-radius:4px}
    .workload-count{font-size:12px;color:#78716C;width:22px;text-align:right}
    .list-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F5F5F4;font-size:13px}
    .list-item:last-child{border-bottom:none}
    .pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
    .week-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
    .week-hdr-row{display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:1px solid #E7E5E4;background:#FAFAF9}
    .week-day-hdr{text-align:center;padding:7px 2px;font-size:11px;font-weight:600;color:#78716C;border-left:1px solid #E7E5E4}
    .week-day-hdr.today-col{color:#0078D4}
    .week-body{display:grid;grid-template-columns:52px repeat(7,1fr);flex:1;overflow-y:auto}
    .week-time{height:50px;border-bottom:1px solid #E7E5E4;font-size:10px;color:#A8A29E;padding:4px 6px;text-align:right}
    .week-slot{height:50px;border-bottom:1px solid #E7E5E4;border-left:1px solid #E7E5E4;cursor:pointer;padding:2px}
    .week-slot:hover{background:#FAFAF9}
    .week-job{font-size:9px;padding:2px 4px;border-radius:3px;font-weight:500;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;border:none;width:100%;text-align:left;display:block}
  </style>
</head>
<body>

<!-- Password -->
<div id="password-screen">
  <div class="pw-box">
    <svg width="32" height="32" viewBox="0 0 21 21" style="margin-bottom:16px"><rect width="10" height="10" fill="#F25022"/><rect x="11" width="10" height="10" fill="#7FBA00"/><rect y="11" width="10" height="10" fill="#00A4EF"/><rect x="11" y="11" width="10" height="10" fill="#FFB900"/></svg>
    <h2>Crew Scheduling — Ironrock</h2>
    <p>Enter the password to continue</p>
    <input id="pw-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" class="pw-error">Incorrect password. Please try again.</div>
    <button class="pw-btn" onclick="checkPw()">Enter</button>
  </div>
</div>

<!-- Loading -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p>Loading jobs...</p>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 21 21"><rect width="10" height="10" fill="#F25022"/><rect x="11" width="10" height="10" fill="#7FBA00"/><rect y="11" width="10" height="10" fill="#00A4EF"/><rect x="11" y="11" width="10" height="10" fill="#FFB900"/></svg>
    <h1>Crew Scheduling — Ironrock</h1>
    <span id="sync-badge" class="sync-badge sync-ok">● Live</span>
  </div>
  <div class="app-body">
    <div class="sidebar">
      <div class="sidebar-hdr">Crews</div>
      <div class="crew-list" id="crew-list"></div>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const SUPA_URL = "https://ljplsmawqpufsbujmcfx.supabase.co";
const SUPA_KEY = "sb_publishable_MBATE_mA-5vOqeIUVge9QQ_h9Omm_IV";
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

const CREWS = [
  {id:1,name:"Crew Alpha",  color:"#0078D4",light:"#E6F1FB",dark:"#004578"},
  {id:2,name:"Crew Bravo",  color:"#107C41",light:"#E1F5EE",dark:"#054220"},
  {id:3,name:"Crew Charlie",color:"#C43E1C",light:"#FAECE7",dark:"#6E1E09"},
  {id:4,name:"Crew Delta",  color:"#B4009E",light:"#F9EAFB",dark:"#5C0051"},
  {id:5,name:"Crew Echo",   color:"#4B3F9E",light:"#EEEDFE",dark:"#2B2463"},
  {id:6,name:"Crew Foxtrot",color:"#986F0B",light:"#FEF3CD",dark:"#4D3706"}
];
const STATUSES = ["Pending","Active","Done"];
const PRECONSTRUCT = ["Material order","Safety plan","Permit filed","Site survey","Equipment reserved","Subcontractor briefed"];

let jobs=[], curYear=new Date().getFullYear(), curMonth=new Date().getMonth();
let view="month", filterCrew=0, modal=null, editJob=null, dragJobId=null;

// ── PASSWORD ──────────────────────────────────────────────
window.checkPw = function(){
  const val = document.getElementById("pw-input").value;
  if(val === "124commerceway"){
    document.getElementById("password-screen").style.display="none";
    document.getElementById("loading-screen").style.display="flex";
    initApp();
  } else {
    document.getElementById("pw-error").style.display="block";
    document.getElementById("pw-input").value="";
    document.getElementById("pw-input").focus();
  }
};
document.getElementById("pw-input").focus();

// ── SUPABASE ──────────────────────────────────────────────
function setBadge(state,text){
  const b=document.getElementById("sync-badge");
  if(!b)return;
  b.textContent=text;
  b.className="sync-badge "+(state==="ok"?"sync-ok":state==="busy"?"sync-busy":"sync-err");
}

function mapRow(r){
  let pre={};try{pre=JSON.parse(r.pre_construction||"{}");}catch{}
  return{
    id:r.id, title:r.title||"", crewId:r.crew_id||1,
    date:r.job_date||"", duration:parseInt(r.duration)||1,
    location:r.location||"", status:r.status||"Pending",
    notes:r.notes||"", pre,
    reminder:r.reminder||false, reminderEmail:r.reminder_email||""
  };
}

function toRow(d){
  return{
    title:d.title, crew_id:d.crewId, job_date:d.date,
    duration:parseInt(d.duration)||1,
    location:d.location||"", status:d.status,
    notes:d.notes||"", pre_construction:JSON.stringify(d.pre||{}),
    reminder:d.reminder||false, reminder_email:d.reminderEmail||""
  };
}

async function fetchJobs(){
  setBadge("busy","Loading...");
  const{data,error}=await db.from("jobs").select("*").order("job_date",{ascending:true});
  if(error)throw error;
  jobs=data.map(mapRow);
  setBadge("ok","● Live");
}

async function createJob(data){
  setBadge("busy","Saving...");
  const{data:row,error}=await db.from("jobs").insert(toRow(data)).select().single();
  if(error)throw error;
  jobs.push(mapRow(row));
  setBadge("ok","● Live");
}

async function updateJob(id,data){
  setBadge("busy","Saving...");
  const{error}=await db.from("jobs").update(toRow(data)).eq("id",id);
  if(error)throw error;
  const idx=jobs.findIndex(j=>j.id===id);
  if(idx>-1)jobs[idx]={...jobs[idx],...data,duration:parseInt(data.duration)||1};
  setBadge("ok","● Live");
}

async function deleteJob(id){
  setBadge("busy","Deleting...");
  const{error}=await db.from("jobs").delete().eq("id",id);
  if(error)throw error;
  jobs=jobs.filter(j=>j.id!==id);
  setBadge("ok","● Live");
}

async function initApp(){
  try{
    await fetchJobs();
    document.getElementById("loading-screen").style.display="none";
    document.getElementById("app").style.display="flex";
    render();
    db.channel("jobs-rt")
      .on("postgres_changes",{event:"*",schema:"public",table:"jobs"},async()=>{
        await fetchJobs(); render();
      }).subscribe();
  }catch(e){
    document.getElementById("loading-screen").innerHTML=
      `<p style="color:#DC2626;padding:20px;text-align:center">Connection error: ${e.message}<br><br>
      <small>Make sure the jobs table exists in Supabase and RLS is disabled.<br>
      Also add a <b>duration</b> column (int4, default 1) if you haven't already.</small></p>`;
  }
}

// ── HELPERS ───────────────────────────────────────────────
const crewById = id => CREWS.find(c=>c.id===id)||CREWS[0];
const pad = n => String(n).padStart(2,"0");
const todayStr = () => { const t=new Date(); return `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`; };
const dateStr = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;

function calcEndDate(startDate, days){
  if(!startDate)return"";
  const d=new Date(startDate);
  d.setDate(d.getDate()+(parseInt(days)||1)-1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function jobSpansDay(job, ds){
  const start = new Date(job.date+"T00:00:00");
  const end   = new Date(calcEndDate(job.date, job.duration||1)+"T00:00:00");
  const check = new Date(ds+"T00:00:00");
  return check >= start && check <= end;
}

const jobsForMonth = (y,m) => jobs.filter(j=>{const d=new Date(j.date);return d.getFullYear()===y&&d.getMonth()===m;});
const activeJobs   = () => filterCrew===0 ? jobs : jobs.filter(j=>j.crewId===filterCrew);

function getConflicts(){
  const map={};
  jobs.forEach(j=>{const k=`${j.crewId}|${j.date}`;(map[k]=map[k]||[]).push(j);});
  return Object.values(map).filter(a=>a.length>1);
}

function hasConflictOnDay(ds){
  const map={};
  activeJobs().filter(j=>jobSpansDay(j,ds)).forEach(j=>map[j.crewId]=(map[j.crewId]||0)+1);
  return Object.values(map).some(v=>v>1);
}

function el(tag,cls,text){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(text!=null)e.textContent=text;
  return e;
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  renderCrewList();
  document.querySelectorAll(".overlay").forEach(e=>e.remove());
  const main=document.getElementById("main");
  main.innerHTML="";
  main.appendChild(buildTopbar());
  if(view!=="dash")main.appendChild(buildStatsBar());
  const body=document.createElement("div");
  body.style.cssText="flex:1;display:flex;flex-direction:column;overflow:hidden";
  if(view==="month"){ body.appendChild(buildDayHeaders()); body.appendChild(buildMonthGrid()); }
  else if(view==="week") body.appendChild(buildWeekView());
  else body.appendChild(buildDashboard());
  main.appendChild(body);
  if(modal) document.body.appendChild(buildModal());
}

function renderCrewList(){
  const list=document.getElementById("crew-list");
  list.innerHTML="";
  const mk=(label,color,count,id)=>{
    const e=document.createElement("div");
    e.className="crew-item"+(filterCrew===id?" active":"");
    e.innerHTML=`<div class="crew-dot" style="background:${color}"></div><span>${label}</span><span class="crew-count">${count}</span>`;
    e.onclick=()=>{filterCrew=id;render();};
    list.appendChild(e);
  };
  mk("All crews","#78716C",jobs.length,0);
  CREWS.forEach(c=>mk(c.name,c.color,jobs.filter(j=>j.crewId===c.id).length,c.id));
}

function buildTopbar(){
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const t=document.createElement("div"); t.className="topbar";
  const prev=el("button","nav-btn","‹");
  prev.onclick=()=>{if(view==="dash")return;curMonth--;if(curMonth<0){curMonth=11;curYear--;}render();};
  const title=el("span","month-title",view==="dash"?"Dashboard":`${MONTHS[curMonth]} ${curYear}`);
  const next=el("button","nav-btn","›");
  next.onclick=()=>{if(view==="dash")return;curMonth++;if(curMonth>11){curMonth=0;curYear++;}render();};
  const todayBtn=el("button","today-btn","Today");
  todayBtn.onclick=()=>{const n=new Date();curYear=n.getFullYear();curMonth=n.getMonth();if(view==="dash")view="month";render();};
  const toggle=document.createElement("div"); toggle.className="view-toggle";
  [["month","Month"],["week","Week"],["dash","Dashboard"]].forEach(([k,label])=>{
    const b=el("button","view-btn"+(view===k?" active":""),label);
    b.onclick=()=>{view=k;render();};
    toggle.appendChild(b);
  });
  const addBtn=el("button","btn-primary","+ New job");
  addBtn.onclick=()=>openNewJob(null);
  const refreshBtn=el("button","today-btn","↻");
  refreshBtn.title="Refresh"; refreshBtn.style.marginLeft="4px";
  refreshBtn.onclick=async()=>{await fetchJobs();render();};
  t.append(prev,title,next,todayBtn,toggle,addBtn,refreshBtn);
  return t;
}

function buildStatsBar(){
  const bar=document.createElement("div"); bar.className="stats-bar";
  const display=(filterCrew===0?jobsForMonth(curYear,curMonth):jobsForMonth(curYear,curMonth).filter(j=>j.crewId===filterCrew));
  const counts={Pending:0,Active:0,Done:0}; display.forEach(j=>counts[j.status]++);
  [{s:"Pending",c:"#78716C"},{s:"Active",c:"#0078D4"},{s:"Done",c:"#107C41"}].forEach(({s,c})=>{
    const e=document.createElement("div"); e.className="stat";
    e.innerHTML=`<div class="stat-dot" style="background:${c}"></div>${counts[s]} ${s}`;
    bar.appendChild(e);
  });
  const conf=getConflicts();
  if(conf.length){const e=document.createElement("div");e.className="stat";e.style.color="#DC2626";e.textContent=`⚠ ${conf.length} conflict${conf.length>1?"s":""}`;bar.appendChild(e);}
  const rem=jobs.filter(j=>j.reminder).length;
  if(rem){const e=document.createElement("div");e.className="stat";e.textContent=`🔔 ${rem} reminder${rem>1?"s":""} set`;bar.appendChild(e);}
  const tot=el("div","stat",`📋 ${display.length} jobs this month`);
  tot.style.marginLeft="auto"; bar.appendChild(tot);
  return bar;
}

function buildDayHeaders(){
  const hdr=document.createElement("div"); hdr.className="day-headers";
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>hdr.appendChild(el("div","day-hdr",d)));
  return hdr;
}

function buildMonthGrid(){
  const grid=document.createElement("div"); grid.className="days-grid";
  const firstDay=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const prevDays=new Date(curYear,curMonth,0).getDate();
  const aj=activeJobs(), ts=todayStr();
  for(let i=0;i<42;i++){
    const cell=document.createElement("div"); cell.className="day-cell";
    let day, mo=curMonth, yr=curYear, other=false;
    if(i<firstDay){ day=prevDays-(firstDay-i-1); mo=curMonth-1; if(mo<0){mo=11;yr--;} other=true; }
    else if(i>=firstDay+daysInMonth){ day=i-firstDay-daysInMonth+1; mo=curMonth+1; if(mo>11){mo=0;yr++;} other=true; }
    else day=i-firstDay+1;
    if(other) cell.classList.add("other-month");
    const ds=dateStr(yr,mo,day);
    if(ds===ts) cell.classList.add("today");
    const numRow=document.createElement("div"); numRow.className="day-num-row";
    numRow.appendChild(el("div","day-num",day));
    if(hasConflictOnDay(ds)){
      const dot=document.createElement("div"); dot.className="conflict-dot"; dot.title="Crew conflict"; numRow.appendChild(dot);
    }
    cell.appendChild(numRow);
    const dayJobs=aj.filter(j=>jobSpansDay(j,ds));
    dayJobs.slice(0,3).forEach(j=>{
      const crew=crewById(j.crewId);
      const isStart=j.date===ds;
      const dur=parseInt(j.duration)||1;
      const chip=document.createElement("button");
      chip.className="job-chip"+(isStart?"":" continuation");
      chip.style.cssText=`background:${crew.light};color:${crew.dark}`;
      chip.textContent=isStart&&dur>1?`${j.title} (${dur}d)`:j.title;
      chip.draggable=isStart;
      if(isStart){
        chip.ondragstart=e=>{dragJobId=j.id;chip.classList.add("dragging");e.dataTransfer.effectAllowed="move";};
        chip.ondragend=()=>{dragJobId=null;chip.classList.remove("dragging");};
      }
      chip.onclick=e=>{e.stopPropagation();openEditJob(j);};
      cell.appendChild(chip);
    });
    if(dayJobs.length>3) cell.appendChild(el("div","more-jobs",`+${dayJobs.length-3} more`));
    cell.ondragover=e=>{e.preventDefault();cell.classList.add("drag-over");};
    cell.ondragleave=()=>cell.classList.remove("drag-over");
    cell.ondrop=async e=>{
      e.preventDefault(); cell.classList.remove("drag-over");
      if(dragJobId){
        const job=jobs.find(j=>j.id===dragJobId);
        if(job){ const old=job.date; job.date=ds; render(); try{await updateJob(job.id,job);}catch{job.date=old;render();} }
      }
    };
    cell.onclick=()=>openNewJob(ds);
    grid.appendChild(cell);
  }
  return grid;
}

function buildWeekView(){
  const wrap=document.createElement("div"); wrap.className="week-wrap";
  const startOfWeek=new Date(curYear,curMonth,1);
  const days=[]; for(let i=0;i<7;i++){const d=new Date(startOfWeek);d.setDate(d.getDate()+i);days.push(d);}
  const DAY_NAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const hdrRow=document.createElement("div"); hdrRow.className="week-hdr-row";
  hdrRow.appendChild(document.createElement("div"));
  days.forEach(d=>{
    const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const e=document.createElement("div");
    e.className="week-day-hdr"+(ds===todayStr()?" today-col":"");
    e.innerHTML=`${DAY_NAMES[d.getDay()]}<br><span style="font-size:15px;font-weight:600">${d.getDate()}</span>`;
    hdrRow.appendChild(e);
  });
  wrap.appendChild(hdrRow);
  const body=document.createElement("div"); body.className="week-body";
  const aj=activeJobs();
  for(let h=6;h<20;h++){
    body.appendChild(el("div","week-time",`${h>12?h-12:h}${h>=12?"pm":"am"}`));
    days.forEach(d=>{
      const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      const slot=document.createElement("div"); slot.className="week-slot";
      if(h===8){
        aj.filter(j=>jobSpansDay(j,ds)).forEach(j=>{
          const crew=crewById(j.crewId);
          const chip=document.createElement("button"); chip.className="week-job";
          chip.style.cssText=`background:${crew.light};color:${crew.dark}`;
          chip.textContent=j.title+(j.duration>1?` (${j.duration}d)`:"");
          chip.onclick=e=>{e.stopPropagation();openEditJob(j);};
          slot.appendChild(chip);
        });
      }
      slot.onclick=()=>openNewJob(ds);
      body.appendChild(slot);
    });
  }
  wrap.appendChild(body);
  return wrap;
}

function buildDashboard(){
  const dash=document.createElement("div"); dash.className="dash";
  const total=jobs.length, done=jobs.filter(j=>j.status==="Done").length,
        active=jobs.filter(j=>j.status==="Active").length,
        pending=jobs.filter(j=>j.status==="Pending").length,
        conflicts=getConflicts(), reminders=jobs.filter(j=>j.reminder).length;
  const grid=document.createElement("div"); grid.className="dash-grid";
  [{l:"Total jobs",v:total},{l:"Active",v:active},{l:"Pending",v:pending},
   {l:"Completed",v:done},{l:"Conflicts",v:conflicts.length},{l:"Reminders",v:reminders}]
  .forEach(({l,v})=>{
    const c=document.createElement("div"); c.className="metric-card";
    c.innerHTML=`<div class="metric-label">${l}</div><div class="metric-val">${v}</div>`;
    grid.appendChild(c);
  });
  dash.appendChild(grid);
  const ws=document.createElement("div"); ws.className="dash-section"; ws.innerHTML="<h3>Crew workload</h3>";
  const maxJ=Math.max(...CREWS.map(c=>jobs.filter(j=>j.crewId===c.id).length),1);
  CREWS.forEach(c=>{
    const cnt=jobs.filter(j=>j.crewId===c.id).length;
    const row=document.createElement("div"); row.className="workload-row";
    row.innerHTML=`<div class="workload-name">${c.name}</div><div class="workload-bar-bg"><div class="workload-bar-fill" style="width:${Math.round(cnt/maxJ*100)}%;background:${c.color}"></div></div><div class="workload-count">${cnt}</div>`;
    ws.appendChild(row);
  });
  dash.appendChild(ws);
  if(conflicts.length){
    const cs=document.createElement("div"); cs.className="dash-section"; cs.innerHTML="<h3>⚠ Crew conflicts</h3>";
    conflicts.forEach(arr=>{
      const crew=crewById(arr[0].crewId);
      arr.forEach(j=>{
        const item=document.createElement("div"); item.className="list-item";
        item.innerHTML=`<div style="width:10px;height:10px;border-radius:50%;background:${crew.color};flex-shrink:0"></div><span style="font-weight:500">${crew.name}</span><span style="color:#78716C">–</span><span>${j.title}</span><span style="color:#A8A29E;font-size:12px;margin-left:auto">${j.date}</span>`;
        item.style.cursor="pointer"; item.onclick=()=>openEditJob(j);
        cs.appendChild(item);
      });
    });
    dash.appendChild(cs);
  }
  const rs=document.createElement("div"); rs.className="dash-section"; rs.innerHTML="<h3>🔔 Email reminders</h3>";
  const rJobs=jobs.filter(j=>j.reminder&&j.reminderEmail);
  if(!rJobs.length){ rs.innerHTML+="<p style='font-size:13px;color:#A8A29E;padding:4px 0'>No reminders set. Enable per job when editing.</p>"; }
  else{
    rJobs.forEach(j=>{
      const d=new Date(j.date); const remind=new Date(d); remind.setDate(remind.getDate()-28);
      const item=document.createElement("div"); item.className="list-item";
      item.innerHTML=`<span>📧</span><span style="font-weight:500">${j.title}</span><span style="color:#78716C;font-size:12px">→ ${j.reminderEmail}</span><span class="pill" style="background:#E6F1FB;color:#004578;margin-left:auto">Sends ${remind.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>`;
      rs.appendChild(item);
    });
  }
  dash.appendChild(rs);
  return dash;
}

// ── MODAL ─────────────────────────────────────────────────
function openNewJob(date){
  editJob=null;
  const pre={}; PRECONSTRUCT.forEach((_,i)=>pre[i]=false);
  modal={mode:"new",date:date||todayStr(),duration:1,title:"",crewId:CREWS[0].id,location:"",status:"Pending",notes:"",pre,reminder:false,reminderEmail:""};
  render();
}
function openEditJob(j){
  editJob=j;
  modal={mode:"edit",...JSON.parse(JSON.stringify(j))};
  render();
}

function buildModal(){
  const overlay=document.createElement("div"); overlay.className="overlay";
  overlay.onclick=e=>{if(e.target===overlay){modal=null;render();}};
  const m=document.createElement("div"); m.className="modal";
  const isNew=modal.mode==="new";

  // Header
  const mh=document.createElement("div"); mh.className="modal-header";
  const h2=el("h2",null,isNew?"New job":"Edit job");
  const cb=el("button","close-btn","×"); cb.onclick=()=>{modal=null;render();};
  mh.append(h2,cb); m.appendChild(mh);

  // Row 1: Start date + Status
  const row1=document.createElement("div"); row1.className="form-row two";
  row1.innerHTML=`
    <div>
      <label>Start date</label>
      <input type="date" id="f-date" value="${modal.date}">
    </div>
    <div>
      <label>Status</label>
      <select id="f-status">${STATUSES.map(s=>`<option${s===modal.status?" selected":""}>${s}</option>`).join("")}</select>
    </div>`;
  m.appendChild(row1);

  // Row 2: Duration + End date
  const row2=document.createElement("div"); row2.className="form-row two";
  row2.innerHTML=`
    <div>
      <label>Duration (days)</label>
      <input type="number" id="f-duration" min="1" value="${modal.duration||1}" placeholder="e.g. 5">
    </div>
    <div>
      <label>End date (auto)</label>
      <input type="date" id="f-enddate" value="${calcEndDate(modal.date, modal.duration||1)}" readonly>
    </div>`;
  m.appendChild(row2);

  // Row 3: Title
  const row3=document.createElement("div"); row3.className="form-row";
  row3.innerHTML=`<label>Job title</label><input type="text" id="f-title" placeholder="e.g. Foundation pour" value="${modal.title||""}">`;
  m.appendChild(row3);

  // Row 4: Location
  const row4=document.createElement("div"); row4.className="form-row";
  row4.innerHTML=`<label>Location / address</label><input type="text" id="f-location" placeholder="e.g. 123 Oak St" value="${modal.location||""}">`;
  m.appendChild(row4);

  // Row 5: Crew
  const row5=document.createElement("div"); row5.className="form-row";
  row5.innerHTML=`<label>Assigned crew</label><select id="f-crew">${CREWS.map(c=>`<option value="${c.id}"${c.id===modal.crewId?" selected":""}>${c.name}</option>`).join("")}</select>`;
  m.appendChild(row5);

  // Row 6: Notes
  const row6=document.createElement("div"); row6.className="form-row";
  row6.innerHTML=`<label>Notes</label><textarea id="f-notes" placeholder="Additional notes...">${modal.notes||""}</textarea>`;
  m.appendChild(row6);

  // Pre-construction checklist
  m.appendChild(el("div","section-label","Pre-construction checklist"));
  const cl=document.createElement("div"); cl.className="checklist-wrap";
  PRECONSTRUCT.forEach((p,i)=>{
    const item=document.createElement("div"); item.className="checklist-item";
    item.innerHTML=`<input type="checkbox" id="pre-${i}"${modal.pre&&modal.pre[i]?" checked":""}><label for="pre-${i}" style="cursor:pointer">${p}</label>`;
    cl.appendChild(item);
  });
  m.appendChild(cl);

  // Reminder
  m.appendChild(el("div","section-label","Email reminder"));
  const rw=document.createElement("div"); rw.className="reminder-wrap";
  rw.innerHTML=`
    <div class="reminder-toggle-row">
      <input type="checkbox" id="f-reminder"${modal.reminder?" checked":""}><label for="f-reminder" style="cursor:pointer">Send reminder 4 weeks before start date</label>
    </div>
    <div id="email-wrap" style="display:${modal.reminder?"block":"none"}">
      <input type="email" id="f-reminder-email" class="reminder-email-input" placeholder="Recipient email" value="${modal.reminderEmail||""}">
      <div class="reminder-note">✉ Email sending activates once Microsoft 365 is connected</div>
    </div>`;
  m.appendChild(rw);

  // Wire up live end-date calculation and reminder toggle
  setTimeout(()=>{
    const fDate=document.getElementById("f-date");
    const fDur=document.getElementById("f-duration");
    const fEnd=document.getElementById("f-enddate");
    const updateEnd=()=>{ if(fDate&&fDur&&fEnd) fEnd.value=calcEndDate(fDate.value,parseInt(fDur.value)||1); };
    if(fDate) fDate.oninput=updateEnd;
    if(fDur)  fDur.oninput=updateEnd;
    const remCb=document.getElementById("f-reminder");
    if(remCb) remCb.onchange=()=>{ document.getElementById("email-wrap").style.display=remCb.checked?"block":"none"; };
  },0);

  // Actions
  const actions=document.createElement("div"); actions.className="modal-actions";
  if(!isNew){
    const del=el("button","btn-danger","Delete");
    del.onclick=async()=>{
      try{ await deleteJob(editJob.id); }catch(e){ alert("Delete failed: "+e.message); return; }
      modal=null; render();
    };
    actions.appendChild(del);
  }
  const cancel=el("button","btn-ghost","Cancel"); cancel.onclick=()=>{modal=null;render();};
  const saveBtn=el("button","btn-primary","Save job");
  saveBtn.onclick=async()=>{
    const t=m.querySelector("#f-title").value.trim();
    if(!t){ m.querySelector("#f-title").style.borderColor="#DC2626"; return; }
    const pre={}; PRECONSTRUCT.forEach((_,i)=>pre[i]=m.querySelector(`#pre-${i}`).checked);
    const data={
      title:t,
      crewId:parseInt(m.querySelector("#f-crew").value),
      date:m.querySelector("#f-date").value,
      duration:parseInt(m.querySelector("#f-duration").value)||1,
      location:m.querySelector("#f-location").value,
      status:m.querySelector("#f-status").value,
      notes:m.querySelector("#f-notes").value,
      pre,
      reminder:m.querySelector("#f-reminder").checked,
      reminderEmail:m.querySelector("#f-reminder-email")?.value||""
    };
    modal=null; render();
    try{
      if(isNew){ await createJob(data); }
      else{ await updateJob(editJob.id,data); }
      render();
    }catch(e){ alert("Save failed: "+e.message); }
  };
  actions.append(cancel,saveBtn);
  m.appendChild(actions);
  overlay.appendChild(m);
  return overlay;
}
</script>
</body>
